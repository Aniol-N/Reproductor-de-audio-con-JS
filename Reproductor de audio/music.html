<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JS Audio Player</title>
    <script src="./main.js" type="module" defer></script>
    <style>
        .song-item {
            border-bottom: 1px solid #ccc;
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .bulk-actions {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .bulk-actions button {
            cursor: pointer;
        }

        #selection-count {
            font-weight: bold;
        }

        #playlists-container button {
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Audio Player</h1>
    <section>
        <label>Filter music by labels:</label>
        <select id="labelFilter" onchange="window.filterByLabel(this.value)">
            <option value="all">All labels</option>
            <option value="pop">Pop</option>
            <option value="rock">Rock</option>
            <option value="hiphop">Hip Hop</option>
            <option value="electronic">Electronic</option>
            <option value="latin">Latin</option>
            <option value="jazz">Jazz</option>
            <option value="classical">Classical</option>
            <option value="reggae">Reggae</option>
            <option value="rnb">R&B</option>
        </select>
    </section>
    <section>
        <h2>My Playlists</h2>
        <button onclick="window.addNewList()">➕ Create New List</button>
        <div id="playlists-container">
        </div>
    </section>
    <hr>
    <section>
        <h2>Songs View</h2>
        <div id="bulk-actions" class="bulk-actions">
            <span id="selection-count">Selected songs: 0</span>
            <button data-bulk-action="play">▶️ Play selected</button>
            <button data-bulk-action="addToList">➕ Add selected to list</button>
            <button data-bulk-action="removeFromList">🗑️ Remove selected from list</button>
            <button data-bulk-action="addLabel">🏷️ Add label to selected</button>
            <button data-bulk-action="removeLabel">🧹 Remove label from selected</button>
            <button data-bulk-action="clearSelection">❌ Clear selection</button>
        </div>
        <div id="songs-container"></div>
    </section>
    <hr>
    <section id="player">
        <h3 id="playback-display">No song selected</h3>
        <audio id="main-audio"></audio>
        <div class="controls">
            <button onclick="window.controlAudio('play')">Play</button>
            <button onclick="window.controlAudio('pause')">Pause</button>
            <button onclick="window.controlAudio('stop')">Stop</button>
        </div>
        <div class="volume">
            <label>Volume:</label>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="window.changeVolume(this.value)">
        </div>
    </section>
</body>

</html>
